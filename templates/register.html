{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center" style="min-height:70vh;">
    <div class="col-lg-5 col-md-7 col-11">
        <div class="glass">
            <div class="text-center mb-4">
                <i class="fas fa-user-plus" style="font-size:3rem;color:#39ff9b;"></i>
                <h2 class="fw-bold neon-green">Create Account</h2>
            </div>
            <form action="/register" method="post">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control form-control-neon" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control form-control-neon" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" name="password" id="regPass" class="form-control form-control-neon" required/>
                        <button class="btn btn-outline-secondary border-0" type="button" onclick="togglePass('regPass')" style="background:rgba(20,28,40,0.7);">
                            <i class="fas fa-eye" style="color:#6a8aaa;"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-success-neon w-100">Register</button>
            </form>
            <p class="text-center mt-3 text-secondary">Have an account? <a href="/login" class="neon-cyan">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
