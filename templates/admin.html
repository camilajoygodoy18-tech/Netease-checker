{% extends "base.html" %}

{% block content %}
<div class="row g-4">
    <div class="col-12"><div class="glass"><h2 class="fw-bold neon-pink"><i class="fas fa-user-shield me-3"></i>Admin Panel</h2><p class="text-secondary">Generate and manage API keys for users.</p></div></div>
    <div class="col-lg-6">
        <div class="glass">
            <h5><i class="fas fa-key neon-purple me-2"></i>Generate API Key</h5>
            <form action="/admin/generate" method="post">
                <div class="mb-3">
                    <label class="form-label">User ID (username)</label>
                    <input type="text" name="user_id" class="form-control form-control-neon" placeholder="Enter username" required />
                </div>
                <button type="submit" class="btn btn-neon w-100"><i class="fas fa-plus-circle me-2"></i>Generate</button>
            </form>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="glass">
            <h5><i class="fas fa-users neon-cyan me-2"></i>Users</h5>
            <div class="scrollable-table" style="max-height:260px;">
                <table class="table table-dark-custom">
                    <thead><tr><th>Username</th><th>Role</th><th>API Key</th></tr></thead>
                    <tbody>
                    {% for username, user in users.items() %}
                    <tr>
                        <td>{{ username }}</td>
                        <td>{{ user.role }}</td>
                        <td><code style="color:#39ff9b;font-size:0.75rem;">{{ user.api_key or '—' }}</code></td>
                    </tr>
                    {% else %}
                    <tr><td colspan="3" class="text-center text-secondary py-3">No users.</td></tr>
                    {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
